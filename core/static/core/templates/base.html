{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Shafnet Tours{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Unified Navigation Bar Layout -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm" style="padding-top: 6px !important; padding-bottom: 6px !important;">
        <div class="container">
            
            <!-- Premium Image Logo Wrapper -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}" style="padding: 0; margin: 0;">
                <img src="{% static 'images/logo.png' %}" 
                     alt="Shafnet Tours & Travel Logo" 
                     loading="eager"
                     style="height: 45px !important; width: auto !important; object-fit: contain; display: block;"
                     onerror="this.onerror=null; this.insertAdjacentHTML('afterend', '<span class=\'fw-bold text-success fs-4\'>Shafnet Tours</span>'); this.remove();">
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'tours' %}">Safaris</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'about' %}">About Us</a></li>
                    <li class="nav-item"><a class="btn btn-success ms-lg-3 px-4 py-2 fw-bold" href="{% url 'contact' %}">Book Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Global Application Main Layout Node -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
